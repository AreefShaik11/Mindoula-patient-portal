sonar.projectKey=AreefShaik11_Mindoula-patient-portal
sonar.organization=areefshaik-prasthana
sonar.projectName=Mindoula Patient Portal

# Sources and tests
sonar.sources=lib
sonar.tests=test
sonar.test.inclusions=test/**/*_test.dart

# !! CRITICAL: This is the correct Dart coverage property (note the plural 'reportPaths')
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclusions (generated files, platform code)
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,lib/generated/**,**/*.js,**/*.ts,**/*.css,web/**,ios/**,android/**,windows/**,linux/**,macos/**
sonar.coverage.exclusions=**/*.g.dart,**/*.freezed.dart,lib/generated/**

# Language
sonar.language=dart
