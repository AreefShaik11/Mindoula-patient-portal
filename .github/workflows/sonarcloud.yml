name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v3.3.0
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@44019c92f49911516e88910408ca4fe567746401 # v2.8.0
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests and Generate Coverage
        run: flutter test --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@a292850901e749c9f0b151e360e2908867a57a12 # v2.0.2
        with:
          args: >
            -Dsonar.projectKey=AreefShaik11_Mindoula-patient-portal
            -Dsonar.organization=areefshaik-prasthana
            -Dsonar.dart.lcov.reportPath=coverage/lcov.info
            -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,lib/generated/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}