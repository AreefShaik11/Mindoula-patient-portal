name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0 

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests and Generate Coverage
        run: flutter test --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@c25d2e7e3def96d0d1781000d3c429da22cd6252 # v2.0.2
        with:
          args: >
            -Dsonar.projectKey=AreefShaik11_Mindoula-patient-portal
            -Dsonar.organization=areefshaik-prasthana
            -Dsonar.dart.lcov.reportPath=coverage/lcov.info
            -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,lib/generated/**,**/*.js,**/*.ts,**/*.css,web/**,ios/**,android/**,windows/**,linux/**,macos/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}