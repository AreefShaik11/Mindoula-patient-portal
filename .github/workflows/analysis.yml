name: Code Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Generate code
      run: flutter packages pub run build_runner build --delete-conflicting-outputs

    - name: Run tests with coverage
      run: flutter test --coverage

    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    - name: Filter coverage (exclude generated files)
      run: |
        lcov --remove coverage/lcov.info '**/*.g.dart' '**/*.freezed.dart' -o coverage/lcov_filtered.info
        mv coverage/lcov_filtered.info coverage/lcov.info

    - name: Generate coverage report
      run: genhtml coverage/lcov.info -o coverage/html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Install SonarScanner
      run: |
        mkdir -p $HOME/.sonar
        curl -sSLo $HOME/.sonar/sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip -o $HOME/.sonar/sonar-scanner.zip -d $HOME/.sonar/
        echo "$HOME/.sonar/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

    - name: Run SonarCloud Scan
      run: |
        sonar-scanner \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.projectKey=AreefShaik11_Mindoula-patient-portal \
          -Dsonar.organization=areefshaik-prasthana \
          -Dsonar.sources=lib \
          -Dsonar.tests=test \
          -Dsonar.test.inclusions=test/**/*_test.dart \
          -Dsonar.dart.lcov.reportPath=${{ github.workspace }}/coverage/lcov.info \
          -Dsonar.projectBaseDir=${{ github.workspace }} \
          -Dsonar.scm.provider=git \
          -Dsonar.verbose=true \
          -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,lib/generated/**,**/*.js,**/*.ts,**/*.css,web/**,ios/**,android/**,windows/**,linux/**,macos/**
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
