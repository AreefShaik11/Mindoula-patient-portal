# SonarCloud Project Configuration

# Project identification
sonar.projectKey=mindoula-patient-portal
sonar.organization=mindoula

# Source and test directories
sonar.sources=lib
sonar.tests=test
sonar.inclusions=**/*.dart
sonar.exclusions=**/*.g.dart,**/generated/**,**/*.freezed.dart

# Coverage configuration
sonar.coverage.exclusions=**/*.g.dart,**/generated/**,**/*.freezed.dart
sonar.test.exclusions=**/*.g.dart,**/generated/**,**/*.freezed.dart

# Language settings
sonar.dart.file.suffixes=.dart

# Quality profiles
sonar.qualityProfile.waitForTasks=true

# Exclude generated files from analysis
sonar.exclusions=**/*.g.dart,**/generated/**,**/*.freezed.dart

# Additional exclusions for better coverage reporting
sonar.cpd.exclusions=**/*.g.dart,**/generated/**,**/*.freezed.dart
